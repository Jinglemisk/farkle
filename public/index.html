<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Farkle - Dice Game</title>
  <link rel="stylesheet" href="styles.css">
  <!-- Add medieval themed font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Game will be rendered here -->
    <div id="lobby" class="container">
      <h1>Farkle!</h1>
      <div class="game-description">
        <p>A multiplayer dice game where players take turns rolling dice, banking points, and trying to reach the score threshold.</p>
      </div>
      
      <div class="player-form">
        <h2>Join Game</h2>
        <div class="form-group">
          <label for="playerName">Your Name:</label>
          <input type="text" id="playerName" placeholder="Enter your name">
        </div>
        <button id="joinBtn" class="btn">Join Game</button>
      </div>
      
      <div class="game-lobby">
        <div class="lobby-section">
          <h2>Players</h2>
          <ul id="playersList" class="players-list">
            <!-- Players will be listed here -->
          </ul>
        </div>
        
        <div class="lobby-section host-controls">
          <h2>Game Settings</h2>
          <div class="form-group">
            <label>Game Mode:</label>
            <div class="game-mode-options">
              <button id="rushMode" class="mode-btn">Rush (2000)</button>
              <button id="sprintMode" class="mode-btn selected">Sprint (4000)</button>
              <button id="marathonMode" class="mode-btn">Marathon (7000)</button>
            </div>
          </div>
          <button id="startBtn" class="btn btn-start" disabled>Start Farkle!</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Socket.io client library -->
  <script src="/socket.io/socket.io.js"></script>
  <!-- Main client script -->
  <script src="main.js"></script>
</body>
</html>
